<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        * {
            box-sizing: border-box; /* Garante que bordas não alterem o X e Y */
        }
        @page {
            size: 794px 1123px; /* Tamanho exato do A4 em pixels (96 DPI) */
            margin: 0;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica', 'Arial', sans-serif;
        }
        .page-container {
            position: relative;
            width: 794px;  /* Sincronize isso com o width do canvas no Frontend */
            height: 1123px; /* Sincronize isso com o height do canvas no Frontend */
            page-break-after: always;
            overflow: hidden; /* Evita gerar páginas em branco extra */
        }
        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .canvas-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        .bingo-card {
            border-collapse: collapse;
            text-align: center;
        }
        .bingo-card td {
            font-weight: bold;
        }
    </style>
</head>
<body>
{{PAGES_DATA}}
</body>
</html>
